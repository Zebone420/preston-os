name: CI

# Lint, typecheck, and run the guard + dashboard test suites on every push
# and PR to master. Read-only: no secrets, no deploys, no live connectors.
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  guards:
    name: guards (typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/guards
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm ci
      - run: npx tsc --noEmit -p tsconfig.json
      - run: npm test

  dashboard:
    name: dashboard (typecheck + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - run: npm ci
      - run: npx tsc --noEmit -p tsconfig.json
      - run: npm test
